<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书数据浏览器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        .container { display: flex; min-height: 100vh; }
        .main-content {
            flex: 1;
            padding: 24px 40px 24px 24px;
            max-width: calc(100% - 360px);
        }
        .note-panel {
            position: fixed;
            right: 0; top: 0;
            width: 340px;
            height: 100vh;
            background: #fff;
            border-left: 1px solid #e5e5e5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: -2px 0 10px rgba(0,0,0,0.05);
        }
        .note-panel h3 {
            font-size: 16px; color: #1a1a1a;
            margin-bottom: 16px; padding-bottom: 12px;
            border-bottom: 2px solid #ff2442;
        }
        .note-textarea {
            flex: 1; width: 100%;
            border: 1px solid #e5e5e5; border-radius: 8px;
            padding: 12px; font-size: 14px; resize: none;
            font-family: inherit; line-height: 1.6;
        }
        .note-textarea:focus { outline: none; border-color: #ff2442; }
        .note-actions {
            margin-top: 12px; display: flex; gap: 8px;
        }
        .btn {
            padding: 8px 16px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .btn-primary { background: #ff2442; color: #fff; }
        .btn-primary:hover { background: #dd1d36; }
        .btn-secondary { background: #f0f0f0; color: #666; }
        .btn-secondary:hover { background: #e5e5e5; }
        .header {
            background: #fff; padding: 20px 24px;
            border-bottom: 1px solid #e5e5e5;
            margin-bottom: 24px; border-radius: 0 0 12px 12px;
        }
        .header h1 { font-size: 22px; color: #1a1a1a; }
        .header p { color: #666; margin-top: 4px; font-size: 14px; }
        .upload-area {
            background: #fff; border-radius: 12px; padding: 40px;
            text-align: center; margin-bottom: 24px;
            border: 2px dashed #e5e5e5; transition: all 0.2s;
        }
        .upload-area:hover { border-color: #ff2442; background: #fffafb; }
        .upload-area input { display: none; }
        .upload-btn {
            display: inline-block; padding: 12px 28px;
            background: #ff2442; color: #fff; border-radius: 8px;
            cursor: pointer; font-size: 15px;
        }
        .upload-btn:hover { background: #dd1d36; }
        .upload-hint { color: #999; font-size: 13px; margin-top: 12px; }
        .category {
            background: #fff; border-radius: 12px;
            margin-bottom: 20px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .category-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #ff2442 0%, #ff6b81 100%);
            color: #fff; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            user-select: none;
        }
        .category-header:hover { background: linear-gradient(135deg, #dd1d36 0%, #ff5266 100%); }
        .category-header h2 { font-size: 16px; font-weight: 600; }
        .category-meta { display: flex; gap: 16px; font-size: 13px; }
        .category-meta span {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px; border-radius: 12px;
        }
        .keyword-label { background: rgba(255,255,255,0.25); padding: 3px 10px; border-radius: 10px; font-size: 12px; }
        .category-content { padding: 16px; }
        .category-content.collapsed { display: none; }
        .post {
            border: 1px solid #e5e5e5; border-radius: 10px;
            margin-bottom: 12px; overflow: hidden; transition: all 0.2s;
        }
        .post:hover { border-color: #ff2442; box-shadow: 0 2px 12px rgba(255,36,66,0.1); }
        .post:last-child { margin-bottom: 0; }
        .post-header {
            padding: 14px 16px; background: #fafafa; cursor: pointer;
            display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
        }
        .post-header-left { flex: 1; }
        .post-title {
            font-size: 15px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 6px;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .post-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: #999; }
        .type-badge {
            background: #fff0f0; color: #ff2442; padding: 2px 8px;
            border-radius: 4px; font-weight: 500;
        }
        .post-meta .stats { display: flex; gap: 10px; }
        .post-detail {
            padding: 0; max-height: 0; overflow: hidden;
            transition: all 0.3s ease;
        }
        .post-detail.expanded {
            padding: 16px; max-height: 1000px; border-top: 1px solid #e5e5e5;
        }
        .post-desc {
            font-size: 14px; color: #444; white-space: pre-wrap;
            margin-bottom: 14px; line-height: 1.7;
        }
        .post-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .tag { background: #f0f0f0; color: #666; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .comments-section { margin-top: 12px; border-top: 1px dashed #e5e5e5; padding-top: 10px; }
        .comments-title { font-size: 13px; font-weight: 600; color: #666; margin-bottom: 8px; }
        .comment-item { background: #fafafa; border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; font-size: 13px; }
        .comment-user { font-weight: 500; color: #333; margin-bottom: 2px; }
        .comment-text { color: #555; line-height: 1.5; }
        .comment-time { font-size: 11px; color: #999; margin-top: 2px; }
        .post-user {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; background: #fafafa; border-radius: 8px; margin-bottom: 10px;
        }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #ddd; }
        .user-info { font-size: 13px; }
        .user-name { font-weight: 500; color: #333; }
        .post-link { display: inline-block; margin-top: 10px; color: #ff2442; text-decoration: none; font-size: 13px; }
        .post-link:hover { text-decoration: underline; }
        .expand-icon { transition: transform 0.2s; font-size: 18px; color: #999; }
        .expand-icon.rotated { transform: rotate(180deg); }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="header">
                <h1>📋 小红书Discovery数据</h1>
                <p id="stats">请先上传JSON文件</p>
            </div>

            <div class="upload-area" id="uploadArea">
                <input type="file" id="fileInput" accept=".json">
                <label for="fileInput" class="upload-btn">📂 选择 all_data.json 文件</label>
                <p class="upload-hint">或直接将文件拖拽到此处</p>
            </div>

            <div id="content" style="display:none"></div>
        </div>

        <div class="note-panel">
            <h3>📝 我的笔记</h3>
            <textarea class="note-textarea" id="notes" placeholder="在这里记录你的笔记...&#10;&#10;点击分类可折叠/展开。&#10;点击帖子标题可展开详情。&#10;笔记自动保存到本地。"></textarea>
            <div class="note-actions">
                <button class="btn btn-primary" onclick="saveNotes()">保存笔记</button>
                <button class="btn btn-secondary" onclick="exportNotes()">导出</button>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const content = document.getElementById('content');
        const stats = document.getElementById('stats');
        const NOTE_KEY = 'xhs_viewer_notes';

        // 加载笔记
        function loadNotes() {
            const saved = localStorage.getItem(NOTE_KEY);
            if (saved) document.getElementById('notes').value = saved;
        }

        function saveNotes() {
            localStorage.setItem(NOTE_KEY, document.getElementById('notes').value);
            alert('笔记已保存到本地');
        }

        function exportNotes() {
            const notes = document.getElementById('notes').value;
            if (!notes.trim()) { alert('笔记为空'); return; }
            const blob = new Blob([notes], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '我的笔记_' + new Date().toISOString().slice(0,10) + '.txt';
            a.click();
        }

        document.getElementById('notes').addEventListener('input', function() {
            localStorage.setItem(NOTE_KEY, this.value);
        });

        // 拖拽
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = '#ff2442'; });
        uploadArea.addEventListener('dragleave', () => uploadArea.style.borderColor = '#e5e5e5');
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.style.borderColor = '#e5e5e5';
            const file = e.dataTransfer.files[0];
            if (file) loadFile(file);
        });

        fileInput.addEventListener('change', e => {
            if (e.target.files[0]) loadFile(e.target.files[0]);
        });

        function loadFile(file) {
            stats.textContent = '正在加载...';
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    uploadArea.style.display = 'none';
                    content.style.display = 'block';
                    renderData(data);
                } catch(err) {
                    stats.textContent = 'JSON解析失败: ' + err.message;
                }
            };
            reader.readAsText(file);
        }

        function formatTime(ts) {
            if (!ts || ts === '0') return '-';
            try {
                const date = new Date(parseInt(ts));
                if (isNaN(date.getTime())) return '-';
                return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
            } catch { return '-'; }
        }

        function formatCount(val) {
            if (!val) return '0';
            if (typeof val === 'string' && val.includes('万')) return val;
            const num = parseInt(val);
            if (num >= 10000) return (num/10000).toFixed(1) + '万';
            return num.toString();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
        }

        function renderData(data) {
            let totalPosts = 0;
            let totalComments = 0;
            data.forEach(cat => {
                totalPosts += (cat.posts?.length || 0);
                cat.posts?.forEach(p => totalComments += (p.comments?.length || 0));
            });
            stats.textContent = `共 ${data.length} 个分类 · ${totalPosts} 篇帖子 · ${totalComments} 条评论`;
            stats.parentElement.querySelector('h1').textContent = '📋 小红书Discovery数据（已加载）';

            content.innerHTML = data.map((cat, ci) => `
                <div class="category">
                    <div class="category-header" onclick="toggleCategory(${ci})">
                        <h2>${escapeHtml(cat.category || '未分类')}</h2>
                        <div class="category-meta">
                            <span class="keyword-label">关键词: ${escapeHtml(cat.keyword || '-')}</span>
                            <span>📌 ${cat.posts?.length || 0} 篇</span>
                            <span class="expand-icon" id="icon-${ci}">▼</span>
                        </div>
                    </div>
                    <div class="category-content" id="cat-${ci}">
                        ${(cat.posts || []).map((post, pi) => `
                            <div class="post">
                                <div class="post-header" onclick="togglePost(${ci},${pi})">
                                    <div class="post-header-left">
                                        <div class="post-title">${escapeHtml(post.title || (post.desc && post.desc.slice(0,80)) || '无标题')}</div>
                                        <div class="post-meta">
                                            <span class="type-badge">${post.type === 'video' ? '🎥 视频' : '📝 图文'}</span>
                                            <span class="stats">
                                                ❤️ ${formatCount(post.liked_count)} ·
                                                ⭐ ${formatCount(post.collected_count)} ·
                                                💬 ${formatCount(post.comment_count)}
                                            </span>
                                            <span>👤 ${escapeHtml(post.nickname || '-')}</span>
                                            <span>📅 ${formatTime(post.time)}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="post-detail" id="detail-${ci}-${pi}">
                                    ${post.desc ? `<div class="post-desc">${escapeHtml(post.desc)}</div>` : ''}
                                    ${post.tag_list ? `<div class="post-tags">${post.tag_list.split(',').map(t => `<span class="tag"># ${escapeHtml(t.trim())}</span>`).join('')}</div>` : ''}
                                    <div class="post-user">
                                        <img class="user-avatar" src="${post.avatar || ''}" onerror="this.style.display='none'">
                                        <div class="user-info">
                                            <div class="user-name">${escapeHtml(post.nickname || '-')}</div>
                                            <div style="color:#999;font-size:12px">ID: ${post.user_id || '-'}</div>
                                        </div>
                                    </div>
                                    ${post.comments && post.comments.length > 0 ? `
                                        <div class="comments-section">
                                            <div class="comments-title">💬 评论 (${post.comments.length}条)</div>
                                            ${post.comments.slice(0, 5).map(c => `
                                                <div class="comment-item">
                                                    <div class="comment-user">${escapeHtml(c.nickname || c.user_name || c.comment_user_nickname || '匿名')}</div>
                                                    <div class="comment-text">${escapeHtml(c.content || c.comment_content || '')}</div>
                                                    <div class="comment-time">${formatTime(c.create_time || c.comment_time || c.time)}</div>
                                                </div>
                                            `).join('')}
                                            ${post.comments.length > 5 ? `<div style="color:#999;font-size:12px;text-align:center">还有 ${post.comments.length - 5} 条评论，点击原文查看</div>` : ''}
                                        </div>
                                    ` : ''}
                                    ${post.note_url ? `<a class="post-link" href="${post.note_url}" target="_blank">🔗 查看原文</a>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleCategory(idx) {
            document.getElementById('cat-' + idx).classList.toggle('collapsed');
            document.getElementById('icon-' + idx).classList.toggle('rotated');
        }

        function togglePost(ci, pi) {
            document.getElementById('detail-' + ci + '-' + pi).classList.toggle('expanded');
        }

        loadNotes();
    </script>
</body>
</html>
