<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Chat Input — LiberStudy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── 配色（来自 color-palette.md） ── */
  :root {
    --bg:        #F7F7F2;   /* 次级背景 */
    --sidebar:   #F2F2EC;   /* 辅助背景 */
    --base:      #EAE9E0;   /* 全局底色 */
    --divider:   #E3E3DA;   /* 分割线 */
    --warm-gray: #D0CFC5;   /* 描边/次要 */
    --olive:     #798C00;   /* 强调/品牌色 */
    --fg:        #292929;   /* 主文本 */
    --secondary: #72726E;   /* 次要文本 */
    --white:     #FFFFFF;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--base);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 40px;
  }

  /* ── 模拟 Notes Panel 外壳 ── */
  .notes-panel {
    width: 420px;
    height: 640px;
    background: var(--white);
    border-radius: 12px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* 顶部 tab 栏（装饰用） */
  .panel-tabs {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 12px 16px 0;
    border-bottom: 1px solid var(--divider);
  }
  .tab {
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--secondary);
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  .tab.active {
    color: var(--fg);
    border-bottom-color: var(--olive);
    font-weight: 600;
  }

  /* 内容区（聊天记录） */
  .panel-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* 聊天气泡 */
  .msg-row { display: flex; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.ai   { justify-content: flex-start; }
  .bubble {
    max-width: 85%;
    padding: 7px 11px;
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    border-radius: 12px;
  }
  .bubble.user {
    background: var(--fg);
    color: var(--white);
    border-radius: 12px 12px 2px 12px;
  }
  .bubble.ai {
    background: var(--sidebar);
    color: var(--fg);
    border-radius: 12px 12px 12px 2px;
  }

  /* 空状态提示 */
  .empty-hint {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: var(--warm-gray);
    font-size: 13px;
  }
  .empty-hint svg { opacity: 0.4; }

  /* ─────────────────────────────
     BOTTOM CHAT AREA
  ───────────────────────────── */
  .chat-bottom {
    flex-shrink: 0;
    padding: 10px 14px 14px;
    border-top: 1px solid var(--divider);
    position: relative;
  }

  /* ── 收起态胶囊 ── */
  .input-collapsed {
    display: flex;
    align-items: center;
    gap: 9px;
    background: var(--sidebar);
    border: 1px solid var(--divider);
    border-radius: 14px;
    padding: 10px 14px;
    cursor: text;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .input-collapsed.hiding {
    opacity: 0;
    transform: scale(0.97);
    pointer-events: none;
  }

  .orb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #798C00, #a8b840, #798C00);
    flex-shrink: 0;
  }

  .collapsed-placeholder {
    flex: 1;
    font-size: 13px;
    color: var(--warm-gray);
  }

  /* ── 展开面板 ── */
  .panel-expanded {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--white);
    border-radius: 14px 14px 0 0;
    box-shadow: 0 -1px 0 var(--divider), 0 -6px 24px rgba(0,0,0,0.06);
    transform: translateY(100%);
    opacity: 0;
    transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.18s ease;
    z-index: 10;
  }
  .panel-expanded.open {
    transform: translateY(0);
    opacity: 1;
  }

  /* 展开面板顶部导航 */
  .exp-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 14px 9px;
    border-bottom: 1px solid var(--divider);
    opacity: 0;
    transition: opacity 0.2s ease 0.08s;
  }
  .panel-expanded.open .exp-nav { opacity: 1; }

  .exp-nav-left {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--fg);
  }
  .page-badge {
    font-size: 10px;
    font-weight: 600;
    color: var(--secondary);
    background: var(--sidebar);
    border: 1px solid var(--divider);
    border-radius: 4px;
    padding: 1px 6px;
    letter-spacing: 0.03em;
  }

  .close-btn {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--secondary);
    border: none;
    background: transparent;
    transition: background 0.1s;
  }
  .close-btn:hover { background: var(--sidebar); }

  /* 模型选择行 */
  .model-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--divider);
    opacity: 0;
    transition: opacity 0.2s ease 0.12s;
  }
  .panel-expanded.open .model-row { opacity: 1; }

  .model-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--warm-gray);
    margin-right: 2px;
  }

  .model-pill {
    padding: 2px 8px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--divider);
    background: transparent;
    color: var(--warm-gray);
    cursor: pointer;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
  }
  .model-pill.active {
    background: var(--base);
    border-color: var(--warm-gray);
    color: var(--fg);
  }

  /* 输入区 */
  .exp-input-wrap {
    padding: 10px 14px 6px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.2s ease 0.18s, transform 0.2s ease 0.18s;
  }
  .panel-expanded.open .exp-input-wrap {
    opacity: 1;
    transform: translateY(0);
  }

  .context-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--sidebar);
    border: 1px solid var(--divider);
    border-radius: 5px;
    padding: 2px 7px;
    font-size: 11px;
    color: var(--secondary);
    margin-bottom: 7px;
  }

  .exp-input-box {
    border: 1.5px solid var(--divider);
    border-radius: 10px;
    padding: 8px 11px 6px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .exp-input-box.focused {
    border-color: var(--olive);
    box-shadow: 0 0 0 3px rgba(121, 140, 0, 0.10);
  }

  .exp-textarea {
    width: 100%;
    font-size: 13px;
    color: var(--fg);
    font-family: inherit;
    line-height: 1.5;
    resize: none;
    border: none;
    outline: none;
    background: transparent;
    min-height: 38px;
    max-height: 100px;
    overflow-y: auto;
    display: block;
    caret-color: var(--olive);
  }
  .exp-textarea::placeholder { color: var(--warm-gray); }

  /* 工具栏 */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 6px;
    border-top: 1px solid var(--divider);
    margin-top: 4px;
  }

  .tb-left { display: flex; gap: 0; align-items: center; }
  .tb-right { display: flex; align-items: center; gap: 4px; }

  .tb-btn {
    width: 26px;
    height: 26px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--warm-gray);
    border: none;
    background: transparent;
    transition: background 0.1s, color 0.1s;
  }
  .tb-btn:hover { background: var(--sidebar); color: var(--secondary); }

  .send-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: none;
    background: var(--warm-gray);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
    transition: background 0.15s;
  }
  .send-btn.active {
    background: var(--olive);
    cursor: pointer;
  }
  .send-btn.active:hover { background: #697a00; }

  /* 遮罩 */
  .chat-overlay {
    position: absolute;
    inset: 0;
    background: rgba(41,41,41,0.04);
    border-radius: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    z-index: 9;
  }
  .chat-overlay.visible { opacity: 1; pointer-events: auto; }

  /* ── 第二个面板：展开态静态预览 ── */
  .label {
    font-size: 11px;
    font-weight: 600;
    color: var(--secondary);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    text-align: center;
  }
</style>
</head>
<body>

<!-- ──────────── 面板 1：交互演示 ──────────── -->
<div>
  <div class="label">交互演示（点击输入框）</div>
  <div class="notes-panel">
    <!-- 顶部 tabs -->
    <div class="panel-tabs">
      <div class="tab active">我的笔记</div>
      <div class="tab">AI 笔记</div>
      <div class="tab">原文</div>
    </div>

    <!-- 内容区：有聊天记录 -->
    <div class="panel-content" id="contentArea">
      <div class="msg-row ai">
        <div class="bubble ai">这一页的核心是「语义对齐」——用 embedding 余弦相似度把 ASR 片段映射到对应的 PPT 页面。</div>
      </div>
      <div class="msg-row user">
        <div class="bubble user">为什么不直接用时间轴排序？</div>
      </div>
      <div class="msg-row ai">
        <div class="bubble ai">因为老师讲课经常跳回前页、或者离开 PPT 去写板书，时间顺序不等于 PPT 顺序。语义相似度比时间更可靠。</div>
      </div>
    </div>

    <!-- 底部 chat 区 -->
    <div class="chat-bottom" id="chatBottom">
      <!-- 遮罩（点击收起） -->
      <div class="chat-overlay" id="overlay" onclick="collapse()"></div>

      <!-- 收起态 -->
      <div class="input-collapsed" id="collapsed" onclick="expand()">
        <div class="orb"></div>
        <div class="collapsed-placeholder">继续提问…</div>
      </div>

      <!-- 展开面板 -->
      <div class="panel-expanded" id="expandedPanel">
        <!-- 顶部导航 -->
        <div class="exp-nav">
          <div class="exp-nav-left">
            AI 对话
            <span class="page-badge">第 3 页</span>
          </div>
          <button class="close-btn" onclick="collapse()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <!-- 模型选择 -->
        <div class="model-row">
          <span class="model-label">模型</span>
          <button class="model-pill active" onclick="selectModel(this)">中转站</button>
          <button class="model-pill" onclick="selectModel(this)">通义千问</button>
          <button class="model-pill" onclick="selectModel(this)">DeepSeek</button>
          <button class="model-pill" onclick="selectModel(this)">豆包</button>
        </div>

        <!-- 输入区 -->
        <div class="exp-input-wrap">
          <div class="context-tag">
            <span>📄</span>
            <span>第 3 页 · 语义对齐算法</span>
          </div>
          <div class="exp-input-box" id="inputBox">
            <textarea
              class="exp-textarea"
              id="mainTextarea"
              placeholder="向 AI 提问… (Enter 发送)"
              oninput="onInput(this)"
              onkeydown="onKeyDown(event)"
            ></textarea>
            <!-- 工具栏 -->
            <div class="toolbar">
              <div class="tb-left">
                <!-- 预留工具按钮 -->
                <button class="tb-btn" title="附件">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                  </svg>
                </button>
              </div>
              <div class="tb-right">
                <button class="send-btn" id="sendBtn" onclick="handleSend()">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"/>
                    <polyline points="5 12 12 5 19 12"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ──────────── 面板 2：展开态静态对比 ──────────── -->
<div>
  <div class="label">展开态静态预览</div>
  <div class="notes-panel">
    <div class="panel-tabs">
      <div class="tab active">我的笔记</div>
      <div class="tab">AI 笔记</div>
      <div class="tab">原文</div>
    </div>

    <!-- 内容区：空状态 -->
    <div class="panel-content">
      <div class="empty-hint">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#D0CFC5" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>向 AI 提问，了解这一页内容</span>
      </div>
    </div>

    <!-- 展开态（静态） -->
    <div class="chat-bottom" style="padding:0; position:relative;">
      <div class="panel-expanded open" style="position:relative; transform:none; opacity:1; box-shadow:0 -1px 0 var(--divider);">
        <div class="exp-nav" style="opacity:1;">
          <div class="exp-nav-left">
            AI 对话
            <span class="page-badge">第 3 页</span>
          </div>
          <button class="close-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <div class="model-row" style="opacity:1;">
          <span class="model-label">模型</span>
          <button class="model-pill active">中转站</button>
          <button class="model-pill">通义千问</button>
          <button class="model-pill">DeepSeek</button>
          <button class="model-pill">豆包</button>
        </div>

        <div class="exp-input-wrap" style="opacity:1; transform:none;">
          <div class="context-tag">
            <span>📄</span>
            <span>第 3 页 · 语义对齐算法</span>
          </div>
          <div class="exp-input-box focused">
            <textarea class="exp-textarea" placeholder="向 AI 提问… (Enter 发送)" style="min-height:32px;"></textarea>
            <div class="toolbar">
              <div class="tb-left">
                <button class="tb-btn">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                  </svg>
                </button>
              </div>
              <div class="tb-right">
                <button class="send-btn">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"/>
                    <polyline points="5 12 12 5 19 12"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let isOpen = false

  function expand() {
    if (isOpen) return
    isOpen = true
    document.getElementById('collapsed').classList.add('hiding')
    document.getElementById('overlay').classList.add('visible')
    setTimeout(() => {
      document.getElementById('expandedPanel').classList.add('open')
      setTimeout(() => document.getElementById('mainTextarea').focus(), 260)
    }, 40)
  }

  function collapse() {
    if (!isOpen) return
    isOpen = false
    document.getElementById('expandedPanel').classList.remove('open')
    document.getElementById('overlay').classList.remove('visible')
    setTimeout(() => {
      document.getElementById('collapsed').classList.remove('hiding')
    }, 280)
  }

  function onInput(el) {
    // 自动撑高
    el.style.height = 'auto'
    el.style.height = Math.min(el.scrollHeight, 100) + 'px'
    // 发送按钮激活态
    const hasText = el.value.trim().length > 0
    document.getElementById('sendBtn').classList.toggle('active', hasText)
  }

  function onKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      handleSend()
    }
    if (e.key === 'Escape') collapse()
  }

  function handleSend() {
    const ta = document.getElementById('mainTextarea')
    const text = ta.value.trim()
    if (!text) return

    // 添加用户消息气泡到内容区
    const content = document.getElementById('contentArea')
    const row = document.createElement('div')
    row.className = 'msg-row user'
    row.innerHTML = `<div class="bubble user">${text.replace(/</g,'&lt;')}</div>`
    content.appendChild(row)
    content.scrollTop = content.scrollHeight

    ta.value = ''
    ta.style.height = 'auto'
    document.getElementById('sendBtn').classList.remove('active')
    collapse()

    // 模拟 AI 回复
    setTimeout(() => {
      const aiRow = document.createElement('div')
      aiRow.className = 'msg-row ai'
      aiRow.innerHTML = `<div class="bubble ai">（模拟回复）正在处理你的问题…</div>`
      content.appendChild(aiRow)
      content.scrollTop = content.scrollHeight
    }, 600)
  }

  function selectModel(btn) {
    document.querySelectorAll('.model-pill').forEach(p => p.classList.remove('active'))
    btn.classList.add('active')
  }

  // 输入框 focus 样式
  document.getElementById('mainTextarea').addEventListener('focus', () => {
    document.getElementById('inputBox').classList.add('focused')
  })
  document.getElementById('mainTextarea').addEventListener('blur', () => {
    document.getElementById('inputBox').classList.remove('focused')
  })
</script>
</body>
</html>
